<!DOCTYPE html>
<html lang="en" data-theme="pixel">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DotMemo">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DotMemo</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&family=Outfit:wght@400;700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* ══════════════════════════════════════
   THEMES (From Budget App)
   ══════════════════════════════════════ */
[data-theme="pixel"]{
  --bg:var(--pix-bg,#ffffff);--surface:#fff;--surface2:#fff;
  --sd:transparent;--sl:transparent;
  --text-hi:var(--pix-text-hi,#000);--text:var(--pix-text,#000);--dim:var(--pix-dim,#555);--muted:#999;
  --hr:#000;
  --accent:var(--pix-accent,#2F35E1);--accent2:var(--pix-accent,#2F35E1);--on-accent:#fff;
  --warn:#ff7b00;--warn-bg:rgba(255,123,0,.12);
  --low:#FF6B9D;--low-bg:rgba(250,88,167,.12);
}
[data-theme="pixel"] *{font-family:'Space Mono',monospace!important;}
[data-theme="pixel"] .btn-main{background:var(--pix-accent,#2F35E1)!important;color:#fff;border:4px solid #000;box-shadow:4px 4px 0 #000;border-radius:0;}
[data-theme="pixel"] .btn-sec{border:4px solid #000;box-shadow:4px 4px 0 #000;border-radius:0;}
[data-theme="pixel"] .sheet{background:#fff!important;border-radius:0!important;}
[data-theme="pixel"] .finput{border-radius:0;border:2px solid #000;}
[data-theme="pixel"] .bconfirm{background:var(--pix-accent,#2F35E1)!important;border:4px solid #000;box-shadow:4px 4px 0 #000;border-radius:0;}
[data-theme="pixel"] .nav{background:var(--pix-nav,#ffffff)!important;border-top:4px solid #000;box-shadow:none;}

:root,[data-theme]{
  --safe:var(--accent);
  --safe2:var(--accent2);
  --safe-bg:color-mix(in srgb,var(--accent) 10%,transparent);
}

.nm-raised{background:var(--surface)!important;box-shadow:5px 6px 12px var(--sd),-3px -3px 8px var(--sl);border:none;}
.nm-raised-sm{background:var(--surface)!important;box-shadow:3px 4px 8px var(--sd),-2px -2px 5px var(--sl);border:none;}
.nm-raised-xs{background:var(--surface)!important;box-shadow:2px 3px 5px var(--sd),-1px -2px 4px var(--sl);border:none;}
.nm-pressed{background:var(--bg)!important;box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 5px var(--sl);border:none;}

html{background:var(--bg);transition:background .4s,color .4s;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:15px;min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;}
.app{max-width:420px;margin:0 auto;padding:0 0 20px;min-height:100vh;position:relative;}

.nav{position:fixed;bottom:0;left:0;right:0;background:var(--surface);display:flex;justify-content:space-around;padding:5px 0 11px;z-index:50;transition:background .4s,box-shadow .4s;}
.nbtn{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 12px;border-radius:10px;}
.nicon{font-size:14px;color:var(--muted);line-height:1;}
.nlabel{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:500;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}
.nbtn.active .nicon,.nbtn.active .nlabel{color:var(--accent);}

.header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 0;}
.logo{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:500;letter-spacing:.24em;color:var(--dim);text-transform:uppercase;}

.btn-main{flex:1;border:none;border-radius:14px;padding:16px 20px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;letter-spacing:.02em;cursor:pointer;background:linear-gradient(145deg,var(--accent2),var(--accent));color:var(--on-accent);box-shadow:4px 5px 11px var(--sd),-2px -2px 5px var(--sl),0 5px 16px rgba(0,0,0,.18);transition:all .18s;}
.btn-main:active{transform:translateY(1px);box-shadow:2px 3px 7px var(--sd),-1px -1px 3px var(--sl);}
.btn-sec{border:none;border-radius:14px;padding:16px 18px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .18s;}
.btn-sec:active{transform:translateY(1px);}

.page{display:none;}
.page.active{display:block;animation:pIn .28s ease-out;}
@keyframes pIn{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

.ctabs{display:flex;border-radius:14px;padding:4px;gap:3px;margin-bottom:14px;}
.ctab{flex:1;border:none;border-radius:11px;padding:11px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--dim);cursor:pointer;transition:all .2s;}
.ctab.active{background:linear-gradient(135deg,var(--accent2),var(--accent));color:var(--on-accent);}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.30);backdrop-filter:blur(3px);z-index:100;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;animation:fadein .18s ease-out;}
@keyframes fadein{from{opacity:0;}to{opacity:1;}}
.sheet{border-radius:24px 24px 0 0;width:100%;max-width:420px;padding:10px 20px 46px;animation:slideup .32s cubic-bezier(.32,1.15,.62,1);transition:background .4s;}
@keyframes slideup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.shandle{width:36px;height:4px;border-radius:2px;margin:10px auto 22px;background:var(--muted);opacity:.5;}
.stitle{font-size:17px;font-weight:800;color:var(--text-hi);letter-spacing:-.01em;margin-bottom:20px;}
.flabel{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);margin-bottom:8px;}
.finput{width:100%;border:none;outline:none;border-radius:13px;padding:14px 15px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:700;color:var(--text-hi);margin-bottom:14px;transition:all .2s;background:var(--bg);}
.finput.big{font-family:'JetBrains Mono',monospace;font-size:36px;font-weight:500;letter-spacing:-.03em;padding:18px 16px;margin-bottom:20px;}
.trow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-top:1px solid var(--hr);}
.tlabel{font-size:14px;font-weight:700;color:var(--text);}
.bconfirm{width:100%;border:none;border-radius:14px;padding:16px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;letter-spacing:.02em;cursor:pointer;margin-top:8px;background:linear-gradient(145deg,var(--accent2),var(--accent));color:var(--on-accent);box-shadow:3px 5px 11px var(--sd),-1px -1px 4px var(--sl),0 5px 14px rgba(0,0,0,.15);transition:opacity .18s;}
.bghost{width:100%;background:none;color:var(--dim);border:none;border-radius:13px;padding:13px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px;}

.theme-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.tcard{border:none;border-radius:14px;padding:12px 10px;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px;}
.tcard-dots{display:flex;gap:3px;}
.tcard-dot{width:8px;height:8px;border-radius:50%;}
.tcard-name{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
.tcard.active{outline:2px solid var(--accent);outline-offset:2px;transform:scale(1.04);}
.sub-grid{display:flex;gap:6px;flex-wrap:wrap;}
.sub-swatch{width:36px;height:36px;border-radius:10px;border:2px solid transparent;cursor:pointer;transition:all .2s;position:relative;}
.sub-swatch.active{border-color:var(--text-hi);transform:scale(1.15);box-shadow:0 3px 10px rgba(0,0,0,.2);}
.sub-swatch.active::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.4);}
.cp-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;}
.cp-row label{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);}
.cp-row input[type="color"]{width:40px;height:30px;border:2px solid #000;padding:0;cursor:pointer;background:none;}

/* STACK theme */
[data-theme="stack"]{
  --bg:#000;--surface:#111;--surface2:#1a1a1a;--sd:transparent;--sl:transparent;
  --text-hi:#fff;--text:#a0a0a0;--dim:#555;--muted:#333;--hr:#222;
  --accent:#00d970;--accent2:#33ff99;--on-accent:#000;
  --warn:#ff8c00;--warn-bg:rgba(255,140,0,.12);--low:#ff4d4d;--low-bg:rgba(255,77,77,.12);
}
[data-theme="stack"] .btn-main{background:#fff!important;color:#000;border-radius:30px;}
[data-theme="stack"] .btn-sec{background:var(--surface)!important;color:#fff;border-radius:30px;}
[data-theme="stack"] .sheet{background:#111!important;}
[data-theme="stack"] .bconfirm{background:#00d970!important;color:#000;}
[data-theme="stack"] .notes-creator{border-color:#333;box-shadow:4px 4px 0 #333!important;background:#111!important;}
[data-theme="stack"] .note-card{border-color:#333;box-shadow:4px 4px 0 #333;background:#111!important;}
[data-theme="stack"] .nav{background:#0a0a0a!important;box-shadow:0 -2px 20px rgba(0,0,0,.6);}

/* GEO theme */
[data-theme="geo"]{
  --bg:#f0f0f5;--surface:#fff;--surface2:#fff;--sd:transparent;--sl:transparent;
  --text-hi:#111;--text:#444;--dim:#888;--muted:#c0c0c0;--hr:rgba(0,0,0,.05);
  --accent:#2F35E1;--accent2:#5a3fff;--on-accent:#fff;
  --warn:#FFD600;--warn-bg:rgba(255,214,0,.12);--low:#ff3366;--low-bg:rgba(255,51,102,.12);
}
[data-theme="geo"] *{font-family:'Outfit',sans-serif!important;}
[data-theme="geo"] .btn-main{background:#1a1a2e!important;color:#fff;border-radius:20px;}
[data-theme="geo"] .btn-sec{background:#fff!important;color:#1a1a2e;border-radius:20px;}
[data-theme="geo"] .sheet{background:#fff!important;}
[data-theme="geo"] .bconfirm{background:#2F35E1!important;}

/* ══════════════════════════════════════
   NOTES SPECIFIC UI (Pixel Keep)
   ══════════════════════════════════════ */
.notes-creator{border:4px solid #000;box-shadow:6px 6px 0 #000!important;border-radius:0;background:var(--surface)!important;padding:16px;margin:16px 14px 24px;}
.notes-creator .finput {border-radius:0; border:2px solid #000;}
.notes-creator .btn-main {border-radius:0; border:4px solid #000; box-shadow:4px 4px 0 #000;}
.notes-creator .btn-sec {border-radius:0; border:4px solid #000; box-shadow:4px 4px 0 #000; background:var(--low); color:#fff;}
.notes-creator .btn-sec.recording {background:var(--warn); animation: pulse 1s infinite alternate;}
@keyframes pulse {from { opacity: 1; } to { opacity: 0.6; }}

.list-builder {display: none; flex-direction: column; gap: 8px; margin-bottom: 10px;}
.list-builder.active {display: flex;}
.list-input-row {display: flex; align-items: center; gap: 8px;}
.list-input-row .finput {margin-bottom: 0; flex: 1;}
.btn-icon {background: var(--surface); border: 2px solid #000; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; box-shadow: 2px 2px 0 #000;}
.btn-icon:active {transform: translate(1px, 1px); box-shadow: 1px 1px 0 #000;}
.btn-icon.remove {color: var(--warn);}
#note-body.hidden {display: none;}

.notes-grid {column-count: 2; column-gap: 16px; width: 100%; padding:0 14px;}
@media (max-width: 600px) {.notes-grid { column-count: 1; }}

.note-card {break-inside: avoid; display: inline-block; width: 100%; border: 4px solid #000; box-shadow: 5px 5px 0 #000; background: var(--surface); padding: 14px; margin-bottom: 16px; position: relative; font-family:'Space Mono',monospace!important;}
.note-title {font-weight: 700; font-size: 14px; margin-bottom: 6px; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom: 4px;}
.note-body {font-size: 13px; white-space: pre-wrap; word-break: break-word;}
.check-item {display: flex; align-items: center; gap: 8px; margin-bottom: 4px;}
.note-chk {width: 18px; height: 18px; border: 2px solid #000; cursor: pointer; appearance: none; background: #fff;}
.note-chk:checked {background: var(--accent);}
.audio-container {margin-top: 8px; background: #f4f4f4; border: 2px dashed #000; padding: 6px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 4px;}
.audio-label {font-size: 10px; font-weight: 700;}
.audio-btns {display: flex; gap: 4px; flex-shrink: 0;}
.del-btn {background: none; border: none; color: var(--low); font-family: 'Space Mono', monospace !important; font-weight: 500; font-size: 9px !important; opacity: 0.6; cursor: pointer; transition: opacity 0.2s;}
.del-btn:hover {opacity: 1;}

/* ── GEMINI THINKING ── */
.gemini-thinking {display: none; align-items: center; gap: 10px; padding: 10px 0;}
.gemini-thinking.visible {display: flex;}
.thinking-dot {width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: tdot 1.2s ease-in-out infinite;}
.thinking-dot:nth-child(2) {animation-delay: .2s;}
.thinking-dot:nth-child(3) {animation-delay: .4s;}
@keyframes tdot {0%,80%,100%{transform:scale(0.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.thinking-label {font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: .1em; color: var(--dim);}

/* ── TRANSCRIPTION OVERLAY ── */
.tp-overlay {display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end;}
.tp-overlay.open {display: flex;}
.tp-panel {background: var(--surface); border: 4px solid #000; box-shadow: 0 -4px 0 #000; border-radius: 0; padding: 16px 18px 36px; width: 100%; max-width: 420px; margin: 0 auto; animation: slideup .28s cubic-bezier(.32,1.15,.62,1); font-family: 'Space Mono', monospace;}
.tp-handle {width: 36px; height: 4px; background: #000; margin: 0 auto 14px; border-radius: 2px;}
.tp-title {font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px;}
.tp-text {font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; background: var(--bg); border: 2px solid #000; padding: 10px 12px; margin-bottom: 14px; min-height: 60px; max-height: 200px; overflow-y: auto;}
.tp-actions {display: flex; gap: 8px;}
.tp-btn-save {flex: 2; border: none; border-radius: 0; padding: 14px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: .06em; cursor: pointer; background: var(--accent); color: #fff; border: 3px solid #000; box-shadow: 3px 3px 0 #000; text-transform: uppercase;}
.tp-btn-discard {flex: 1; border: none; border-radius: 0; padding: 14px; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: .06em; cursor: pointer; background: var(--surface); color: var(--text); border: 3px solid #000; box-shadow: 3px 3px 0 #000; text-transform: uppercase;}

/* ── BIG MODE overrides ── */
[data-big="1"] {
  --fs-scale: 1.2;
}
[data-big="2"] {
  --fs-scale: 1.45;
}

:is([data-big="1"], [data-big="2"]) body { font-size: calc(15px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .finput { font-size: calc(15px * var(--fs-scale)) !important; padding: calc(14px * var(--fs-scale)) calc(15px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .finput.big { font-size: calc(36px * var(--fs-scale)) !important; padding: calc(18px * var(--fs-scale)) calc(16px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .btn-main, :is([data-big="1"], [data-big="2"]) .btn-sec { font-size: calc(14px * var(--fs-scale)) !important; padding: calc(16px * var(--fs-scale)) calc(20px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .logo { font-size: calc(11px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .note-title { font-size: calc(14px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .note-body { font-size: calc(13px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .check-item { font-size: calc(13px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .stitle { font-size: calc(17px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .flabel { font-size: calc(10px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .ctab { font-size: calc(12px * var(--fs-scale)) !important; padding: calc(11px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .note-card { padding: calc(14px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .audio-label { font-size: calc(10px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .del-btn { font-size: calc(9px * var(--fs-scale)) !important; }
:is([data-big="1"], [data-big="2"]) .audio-container button { font-size: calc(11px * var(--fs-scale)) !important; padding: calc(4px * var(--fs-scale)) calc(8px * var(--fs-scale)) !important; }
/* Chunky borders and layout improvements */
textarea.finput {
  max-width: 100%;
  resize: vertical;
  min-height: 80px;
}
.notes-creator-title-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: stretch;
}
.notes-creator-title-row .finput {
  margin-bottom: 0 !important;
  flex: 1;
  height: 46px;
  padding: 10px 12px;
}
.notes-creator-title-row .btn-icon {
  width: 46px;
  height: 46px;
  box-shadow: 3px 3px 0 #000;
}
.notes-creator .action-row {
  margin: 14px 0 0 !important;
  display: flex;
  gap: 10px;
}
.action-row {
  display: flex;
  gap: 10px;
}

/* Modal and panel styling overrides for pixel theme */
[data-theme="pixel"] .sheet {
  background: #fff !important;
  border: 4px solid #000 !important;
  border-bottom: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}
[data-theme="pixel"] .tp-panel {
  background: #fff !important;
  border: 4px solid #000 !important;
  border-bottom: none !important;
  border-radius: 0 !important;
  box-shadow: none !important;
}
[data-theme="pixel"] .tp-handle {
  height: 6px;
  background: #000;
  border: 2px solid #000;
  border-radius: 0;
}
[data-theme="pixel"] .tcard {
  border: 3px solid #000 !important;
  border-radius: 0 !important;
  box-shadow: 3px 3px 0 #000 !important;
  background: #fff !important;
}
[data-theme="pixel"] .tcard.active {
  outline: none !important;
  border-color: var(--accent) !important;
  box-shadow: 3px 3px 0 var(--accent) !important;
}
[data-theme="pixel"] .sub-swatch {
  border: 2px solid #000 !important;
  border-radius: 0 !important;
  box-shadow: 2px 2px 0 #000 !important;
}
[data-theme="pixel"] .sub-swatch.active {
  border-color: var(--text-hi) !important;
  box-shadow: 3px 3px 0 #000 !important;
}
[data-theme="pixel"] .btn-icon {
  border: 3px solid #000 !important;
  border-radius: 0 !important;
  box-shadow: 3px 3px 0 #000 !important;
}

.theme-fab {
  position: relative;
  margin: 32px auto 20px;
  width: fit-content;
  padding: 10px 16px;
  height: auto;
  border: 3px solid #000;
  background: var(--surface);
  color: var(--text-hi);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  z-index: 90;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: 3px 3px 0 #000;
  transition: transform 0.15s, box-shadow 0.15s;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.theme-fab:active {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0 #000;
}
[data-theme="pixel"] .theme-fab {
  border-radius: 0 !important;
}
[data-theme="stack"] .theme-fab {
  border-radius: 30px !important;
  border-color: #333 !important;
  box-shadow: 3px 3px 0 #333 !important;
}
[data-theme="geo"] .theme-fab {
  border-radius: 12px !important;
  border-color: #1a1a2e !important;
  box-shadow: none !important;
}

/* Hide original components no longer corresponding to the new layouts */
.tcard-dots, #sub-theme-sec, #pwa-install-btn { display: none !important; }

/* ══════════════════════════════════════
   NEOMORPHIC THEMES (Stack = Dark, Geo = Light)
   ══════════════════════════════════════ */
/* Scoped to Stack and Geo so Pixel (Default) remains Brutalist */

[data-theme="stack"] {
  --bg: #26282B;
  --text-hi: #E0E5EC;
  --text: #C0C5CE;
  --dim: #888;
  --muted: #555;
  --hr: #1a1c1e;
  --accent-grad: linear-gradient(145deg, #FF6A4A, #FF4B2B);
  --accent-glow: rgba(255, 75, 43, 0.4);
}

[data-theme="geo"] {
  --bg: #E0E5EC;
  --text-hi: #22223b;
  --text: #4a4e69;
  --dim: #888;
  --muted: #aaa;
  --hr: #a3b1c6;
  --accent-grad: linear-gradient(145deg, #FF6A4A, #FF4B2B);
  --accent-glow: rgba(255, 75, 43, 0.4);
}

/* ── ADAPTIVE ADAPTIVE SHADOW ENGINE ── */
/* Generates perfect math-calculated neomorphic extrusions for ANY selected color from the custom picker */
:is([data-theme="stack"], [data-theme="geo"]) {
  --sd: color-mix(in srgb, var(--bg) 82%, #000) !important;
  --sl: color-mix(in srgb, var(--bg) 86%, #fff) !important;
  --surface: var(--bg) !important;
  --surface2: var(--bg) !important;
}

:is([data-theme="stack"], [data-theme="geo"]) * {
  font-family: 'Nunito', sans-serif !important;
}

:is([data-theme="stack"], [data-theme="geo"]) body {
  background: var(--bg) !important;
  color: var(--text) !important;
}

:is([data-theme="stack"], [data-theme="geo"]) .logo {
  font-size: 14px; font-weight: 800; letter-spacing: .2em; color: var(--text-hi);
}

:is([data-theme="stack"], [data-theme="geo"]) .notes-creator,
:is([data-theme="stack"], [data-theme="geo"]) .note-card,
:is([data-theme="stack"], [data-theme="geo"]) .sheet,
:is([data-theme="stack"], [data-theme="geo"]) .tp-panel {
  background: var(--bg) !important;
  border: none !important;
  border-radius: 16px !important;
  box-shadow: 8px 8px 16px var(--sd), -8px -8px 16px var(--sl) !important;
}

:is([data-theme="stack"], [data-theme="geo"]) .finput,
:is([data-theme="stack"], [data-theme="geo"]) .tp-text,
:is([data-theme="stack"], [data-theme="geo"]) .audio-container {
  background: var(--bg) !important;
  border: none !important;
  border-radius: 12px !important;
  box-shadow: inset 6px 6px 12px var(--sd), inset -6px -6px 12px var(--sl) !important;
  color: var(--text-hi) !important;
  outline: none !important;
}
:is([data-theme="stack"], [data-theme="geo"]) .finput:focus { outline: none !important; background: var(--bg) !important; }

:is([data-theme="stack"], [data-theme="geo"]) .btn-sec,
:is([data-theme="stack"], [data-theme="geo"]) .btn-icon,
:is([data-theme="stack"], [data-theme="geo"]) .del-btn,
:is([data-theme="stack"], [data-theme="geo"]) .bghost,
:is([data-theme="stack"], [data-theme="geo"]) .ctab,
:is([data-theme="stack"], [data-theme="geo"]) .theme-fab,
:is([data-theme="stack"], [data-theme="geo"]) .tcard {
  background: var(--bg) !important;
  border: none !important;
  border-radius: 50px !important;
  color: var(--text-hi) !important;
  box-shadow: 8px 8px 16px var(--sd), -8px -8px 16px var(--sl) !important;
  transition: box-shadow 0.1s ease, transform 0.1s ease;
  display: flex; align-items: center; justify-content: center;
}
:is([data-theme="stack"], [data-theme="geo"]) .btn-icon {
  width: 46px; height: 46px; border-radius: 50% !important;
}
:is([data-theme="stack"], [data-theme="geo"]) .tcard {
  border-radius: 16px !important;
}

:is([data-theme="stack"], [data-theme="geo"]) .btn-main,
:is([data-theme="stack"], [data-theme="geo"]) .bconfirm,
:is([data-theme="stack"], [data-theme="geo"]) .tp-btn-save {
  background: var(--accent-grad) !important;
  border: none !important;
  border-radius: 50px !important;
  padding: 14px 24px !important;
  color: #fff !important;
  font-weight: 800;
  box-shadow: 6px 6px 12px var(--sd), -6px -6px 12px var(--sl), 0 6px 16px var(--accent-glow) !important;
  text-transform: uppercase;
  letter-spacing: 1px;
}

:is([data-theme="stack"], [data-theme="geo"]) .btn-sec:active,
:is([data-theme="stack"], [data-theme="geo"]) .btn-icon:active,
:is([data-theme="stack"], [data-theme="geo"]) .del-btn:active,
:is([data-theme="stack"], [data-theme="geo"]) .bghost:active,
:is([data-theme="stack"], [data-theme="geo"]) .ctab:active,
:is([data-theme="stack"], [data-theme="geo"]) .theme-fab:active,
:is([data-theme="stack"], [data-theme="geo"]) .tcard:active {
  box-shadow: inset 6px 6px 12px var(--sd), inset -6px -6px 12px var(--sl) !important;
}
:is([data-theme="stack"], [data-theme="geo"]) .btn-main:active,
:is([data-theme="stack"], [data-theme="geo"]) .bconfirm:active,
:is([data-theme="stack"], [data-theme="geo"]) .tp-btn-save:active {
  box-shadow: inset 4px 4px 10px rgba(0,0,0,0.3), inset -4px -4px 10px rgba(255,255,255,0.2) !important;
}

:is([data-theme="stack"], [data-theme="geo"]) .tcard.active {
  box-shadow: inset 6px 6px 12px var(--sd), inset -6px -6px 12px var(--sl) !important;
  outline: none !important;
  border: 2px solid var(--accent-glow) !important;
}

:is([data-theme="stack"], [data-theme="geo"]) .note-chk {
  appearance: none;
  background: var(--bg) !important;
  border: none !important;
  border-radius: 50% !important;
  box-shadow: inset 4px 4px 8px var(--sd), inset -4px -4px 8px var(--sl) !important;
  width: 24px; height: 24px;
  position: relative;
}
:is([data-theme="stack"], [data-theme="geo"]) .note-chk:checked::after {
  content: ''; position: absolute; top: 6px; left: 6px; right: 6px; bottom: 6px;
  background: var(--accent-grad); border-radius: 50%;
  box-shadow: 0 0 8px var(--accent-glow);
}

:is([data-theme="stack"], [data-theme="geo"]) .nav {
  background: var(--bg) !important;
  border: none !important;
  box-shadow: 0 -8px 16px var(--sd) !important;
}

:is([data-theme="stack"], [data-theme="geo"]) .shandle,
:is([data-theme="stack"], [data-theme="geo"]) .tp-handle {
  background: var(--sl) !important;
  box-shadow: inset 1px 1px 2px rgba(0,0,0,0.2) !important;
  border: none !important;
  height: 6px !important;
  border-radius: 3px !important;
}
:is([data-theme="stack"], [data-theme="geo"]) .note-title,
:is([data-theme="stack"], [data-theme="geo"]) .stitle {
  border-bottom: none !important;
  color: var(--text-hi) !important;
}

:is([data-theme="stack"], [data-theme="geo"]) .notes-creator .btn-sec.recording {
  background: var(--accent-grad) !important;
  color: #fff !important;
  box-shadow: 0 0 16px var(--accent-glow), inset 4px 4px 10px rgba(0,0,0,0.3) !important;
  animation: none !important;
}

/* ── COLOR SELECTOR STYLING ── */
:is([data-theme="stack"], [data-theme="geo"]) #custom-colors {
  display: block !important;
  margin-top: 10px;
}

:is([data-theme="stack"], [data-theme="geo"]) .flabel {
  display: block !important;
  font-family: 'Nunito', sans-serif !important;
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text-hi);
  margin-top: 18px;
  margin-bottom: 8px;
}

:is([data-theme="stack"], [data-theme="geo"]) .cp-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg) !important;
  border-radius: 14px;
  margin-bottom: 10px;
  box-shadow: 6px 6px 12px var(--sd), -6px -6px 12px var(--sl);
}

:is([data-theme="stack"], [data-theme="geo"]) .cp-row label {
  font-family: 'Nunito', sans-serif !important;
  font-size: 13px;
  font-weight: 700;
  color: var(--text);
  text-transform: none;
  letter-spacing: normal;
}

:is([data-theme="stack"], [data-theme="geo"]) .cp-row input[type="color"] {
  -webkit-appearance: none;
  border: none !important;
  width: 44px;
  height: 26px;
  border-radius: 8px;
  cursor: pointer;
  background: none !important;
  box-shadow: inset 3px 3px 6px var(--sd), inset -3px -3px 6px var(--sl);
}

:is([data-theme="stack"], [data-theme="geo"]) .cp-row input[type="color"]::-webkit-color-swatch-wrapper {
  padding: 0;
}

:is([data-theme="stack"], [data-theme="geo"]) .cp-row input[type="color"]::-webkit-color-swatch {
  border: none !important;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="app">

<!-- NOTES PAGE -->
<div class="page active" id="pg-notes">
  <div class="header">
    <div class="logo">DotMemo</div>
  </div>

  <div class="notes-creator">
    <div class="notes-creator-title-row">
      <input type="text" id="note-title" class="finput" placeholder="TITLE..." autocomplete="off">
      <button class="btn-icon" id="mode-toggle-btn" onclick="toggleInputMode()" title="Toggle List Mode">☑️</button>
    </div>
    
    <textarea id="note-body" class="finput" rows="3" placeholder="BRAIN DUMP..."></textarea>
    
    <div id="list-builder" class="list-builder">
      <div id="list-items-container"></div>
      <button class="btn-sec" style="width: fit-content; padding: 6px 12px; font-size: 12px;" onclick="addListInputRow()">+ Add Item</button>
    </div>

    <div class="action-row">
      <button class="btn-main" id="save-note-btn" onclick="saveNote()">Save Note</button>
      <button class="btn-sec" id="cancel-edit-btn" onclick="cancelEdit()" style="display:none; background:var(--surface); color:#000;">Cancel</button>
      <button class="btn-sec" id="mic-btn" onclick="toggleRecording()">Rec Audio</button>
    </div>
  </div>

  <div class="notes-grid" id="notes-container"></div>
  <button class="theme-fab" onclick="openSheet('sh-theme');renderThemeGrid()" title="Theme Settings">◐ Theme Settings</button>
</div>

</div>

<!-- THEME SHEET -->
<div class="overlay" id="sh-theme">
  <div class="sheet nm-raised">
    <div class="shandle"></div>
    <div class="stitle">Theme</div>
    <div class="theme-grid" id="theme-grid"></div>
    <div id="sub-theme-sec" style="display:none">
      <div class="flabel" style="margin-top:14px">Color variation</div>
      <div class="sub-grid" id="sub-grid"></div>
    </div>
    <div class="flabel" style="margin-top:16px">Text & Button Size</div>
    <div class="ctabs nm-pressed" style="margin-top:8px;margin-bottom:8px">
      <button class="ctab" id="size-normal" onclick="applyBigMode('0')">Normal</button>
      <button class="ctab" id="size-large" onclick="applyBigMode('1')">Large</button>
      <button class="ctab" id="size-huge" onclick="applyBigMode('2')">Huge</button>
    </div>
    <div class="flabel" style="margin-top:16px">Custom colors</div>
    <div id="custom-colors"></div>
    <div id="pwa-install-btn" onclick="installPWA()" style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;padding:12px 16px;background:#2F35E1;color:#fff;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:.1em;cursor:pointer;border:3px solid #000;box-shadow:4px 4px 0 #000;text-transform:uppercase;">
      <span style="font-size:16px;">⬇</span> <span id="pwa-install-label">Install App</span>
    </div>
    <button class="bghost" onclick="closeSheet('sh-theme')" style="margin-top:8px">Done</button>
  </div>
</div>

<!-- TRANSCRIPTION OVERLAY -->
<div class="tp-overlay" id="tpOverlay">
  <div class="tp-panel">
    <div class="tp-handle"></div>
    <div class="tp-title">🎙 Dictation</div>
    <div id="geminiThinkingInline" class="gemini-thinking">
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <div class="thinking-dot"></div>
      <span class="thinking-label" id="thinkingLabel">PROCESSING AUDIO...</span>
    </div>
    <div class="tp-text" id="tpText">(no text converted)</div>
    <div class="tp-actions">
      <button class="tp-btn-save" id="tpSaveBtn" onclick="saveTranscriptionAsNote()">Save as Note</button>
      <button class="tp-btn-discard" onclick="dismissTranscription()">Discard</button>
    </div>
  </div>
</div>

<script>
// ── LOCAL STORAGE & BASE STATE ──
const DEF = {
  theme: 'pixel',
  customColors: null,
  subTheme: 0
};
function load() {
  try {
    const s = localStorage.getItem('pixel-keep-settings');
    if (s) return JSON.parse(s);
  } catch (e) {}
  return JSON.parse(JSON.stringify(DEF));
}
function save() {
  localStorage.setItem('pixel-keep-settings', JSON.stringify(S));
}
let S = load();

const THEMES = {
  pixel: {
    name: 'Pixel',
    dots: ['#ffffff', '#2F35E1', '#FF6B9D'],
    subs: [
      { name: 'Arcade', bg: '#ffffff', accent: '#2F35E1', stat1: '#00e5ff', stat2: '#FF6B9D', nav: '#ffffff' },
      { name: 'Bubblegum', bg: '#ffb3d9', accent: '#d6336c', stat1: '#ffd43b', stat2: '#845ef7', nav: '#ffb3d9' },
      { name: 'Terminal', bg: '#1a1a2e', accent: '#00ff41', stat1: '#00ff41', stat2: '#39ff14', nav: '#1a1a2e', textHi: '#00ff41', text: '#00cc33', dim: '#009926' },
      { name: 'Ocean', bg: '#0077b6', accent: '#fff', stat1: '#caf0f8', stat2: '#90e0ef', nav: '#0077b6', textHi: '#fff', text: '#caf0f8', dim: '#90e0ef' },
      { name: 'Peach', bg: '#fec89a', accent: '#6d4c41', stat1: '#f9dcc4', stat2: '#ffccd5', nav: '#fec89a' },
      { name: 'Mono', bg: '#ffffff', accent: '#000000', stat1: '#000000', stat2: '#000000', nav: '#ffffff', textHi: '#000000', text: '#000000', dim: '#555555', safe: '#2F35E1' }
    ]
  },
  stack: {
    name: 'Stack',
    dots: ['#00d970', '#fae100', '#ff8c00'],
    subs: [
      { name: 'Neon', pills: ['#fae100', '#00d970', '#ff8c00', '#7a63ff', '#ff6b9e'], accent: '#00d970' },
      { name: 'Pastel', pills: ['#ffd6a5', '#caffbf', '#bdb2ff', '#ffc6ff', '#a0c4ff'], accent: '#caffbf' },
      { name: 'Fire', pills: ['#ff0000', '#ff4500', '#ff6347', '#ff7f50', '#ffa07a'], accent: '#ff4500' },
      { name: 'Ocean', pills: ['#0077b6', '#00b4d8', '#90e0ef', '#caf0f8', '#023e8a'], accent: '#00b4d8' },
      { name: 'Candy', pills: ['#f72585', '#7209b7', '#3a0ca3', '#4361ee', '#4cc9f0'], accent: '#f72585' }
    ]
  },
  geo: {
    name: 'Geo',
    dots: ['#ff7b00', '#2F35E1', '#f0f0f5'],
    subs: [
      { name: 'Default', accent: '#2F35E1', stat1: '#ff7b00' },
      { name: 'Ember', accent: '#e63946', stat1: '#f4a261' },
      { name: 'Teal', accent: '#2a9d8f', stat1: '#264653' },
      { name: 'Royal', accent: '#6a0dad', stat1: '#e040fb' },
      { name: 'Slate', accent: '#37474f', stat1: '#78909c' }
    ]
  }
};

function applyTheme() {
  if (!THEMES[S.theme]) { S.theme = 'pixel'; S.subTheme = 0; }
  document.documentElement.setAttribute('data-theme', S.theme);
  applySubTheme();
  applyCustomColors();
}

let bigMode = localStorage.getItem("pixel-keep-bigMode") || "0";
function applyBigMode(val) {
  bigMode = val;
  localStorage.setItem("pixel-keep-bigMode", val);
  document.documentElement.setAttribute("data-big", val);
  ["0", "1", "2"].forEach(sz => {
    const btn = document.getElementById("size-" + (sz === "0" ? "normal" : sz === "1" ? "large" : "huge"));
    if (btn) btn.classList.toggle("active", bigMode === sz);
  });
}

function applySubTheme() {
  const root = document.documentElement;
  ['--bg', '--surface', '--surface2', '--accent', '--accent2', '--text-hi', '--text', '--dim', '--hr',
   '--pix-bg', '--pix-accent', '--pix-stat1', '--pix-stat2', '--pix-nav', '--pix-text-hi', '--pix-text', '--pix-dim',
   '--stk-pill-1', '--stk-pill-2', '--stk-pill-3', '--stk-pill-4', '--stk-pill-5',
   '--geo-accent', '--geo-stat1', '--safe'
  ].forEach(v => root.style.removeProperty(v));
  const info = THEMES[S.theme];
  if (!info?.subs) return;
  const sub = info.subs[S.subTheme || 0];
  if (!sub) return;

  if (sub.safe) root.style.setProperty('--safe', sub.safe);

  if (S.theme === 'pixel') {
    root.style.setProperty('--pix-bg', sub.bg);
    root.style.setProperty('--pix-accent', sub.accent);
    root.style.setProperty('--pix-stat1', sub.stat1);
    root.style.setProperty('--pix-stat2', sub.stat2);
    root.style.setProperty('--pix-nav', sub.nav);
    if (sub.textHi) {
      root.style.setProperty('--pix-text-hi', sub.textHi); root.style.setProperty('--pix-text', sub.text); root.style.setProperty('--pix-dim', sub.dim);
      root.style.setProperty('--surface', sub.bg); root.style.setProperty('--surface2', sub.bg);
      root.style.setProperty('--text-hi', sub.textHi); root.style.setProperty('--text', sub.text); root.style.setProperty('--dim', sub.dim); root.style.setProperty('--hr', sub.dim);
    }
  } else if (S.theme === 'stack') {
    sub.pills.forEach((c, i) => root.style.setProperty('--stk-pill-' + (i + 1), c));
    root.style.setProperty('--accent', sub.accent); root.style.setProperty('--accent2', sub.accent);
  } else if (S.theme === 'geo') {
    root.style.setProperty('--accent', sub.accent); root.style.setProperty('--accent2', sub.accent);
    root.style.setProperty('--geo-stat1', sub.stat1);
  }
}

function applyCustomColors() {
  const root = document.documentElement;
  const cc = S.customColors;
  if (!cc) return;
  if (cc.bg) root.style.setProperty('--bg', cc.bg);
  if (cc.text) { root.style.setProperty('--text-hi', cc.text); root.style.setProperty('--text', cc.text); }
  if (cc.accent) { root.style.setProperty('--accent', cc.accent); root.style.setProperty('--accent2', cc.accent); root.style.setProperty('--pix-accent', cc.accent); }
  if (cc.bold) { root.style.setProperty('--pix-stat1', cc.bold); root.style.setProperty('--pix-stat2', cc.bold); root.style.setProperty('--pix-nav', cc.bold); }
}

function setTheme(t) { S.theme = t; S.subTheme = 0; S.customColors = null; applyTheme(); renderThemeGrid(); save(); }
function setSubTheme(i) { S.subTheme = i; S.customColors = null; applyTheme(); renderThemeGrid(); save(); }

function setCustomColor(key, val) {
  if (!S.customColors) S.customColors = {};
  S.customColors[key] = val;
  applyTheme(); save();
}

function renderThemeGrid() {
  const grid = document.getElementById('theme-grid');
  if (!grid) return;
  grid.innerHTML = Object.entries(THEMES).map(([k, v]) => `
    <button class="tcard nm-raised-sm${S.theme === k ? ' active' : ''}" onclick="setTheme('${k}')">
      <div class="tcard-dots">${v.dots.map(c => `<span class="tcard-dot" style="background:${c}"></span>`).join('')}</div>
      <div class="tcard-name">${v.name}</div>
    </button>`).join('');

  const subSec = document.getElementById('sub-theme-sec');
  const subGrid = document.getElementById('sub-grid');
  const info = THEMES[S.theme];
  if (info?.subs && subSec) {
    subSec.style.display = 'block';
    subGrid.innerHTML = info.subs.map((s, i) => {
      const bg = S.theme === 'pixel' ? s.bg : S.theme === 'stack' ? (s.pills ? s.pills[0] : s.accent) : s.accent;
      return `<div style="display:flex;flex-direction:column;align-items:center;gap:3px">
        <button class="sub-swatch${(S.subTheme || 0) === i ? ' active' : ''}" style="background:${bg}" onclick="setSubTheme(${i})" title="${s.name}"></button>
        <span style="font-size:8px;font-weight:700;color:var(--dim);letter-spacing:.04em;text-transform:uppercase">${s.name}</span>
      </div>`;
    }).join('');
  } else if (subSec) subSec.style.display = 'none';

  const cpEl = document.getElementById('custom-colors');
  if (cpEl) {
    let defBg = '#ffffff', defText = '#000000', defAccent = '#2F35E1', defBold = '#2F35E1';
    if (info && info.subs) {
      const sub = info.subs[S.subTheme || 0] || {};
      if (S.theme === 'pixel') {
        defBg = sub.bg || '#ffffff'; defText = sub.textHi || '#000000'; defAccent = sub.accent || '#2F35E1'; defBold = sub.stat1 || sub.accent || '#00e5ff';
      } else if (S.theme === 'stack') {
        defBg = '#000000'; defText = '#ffffff'; defAccent = sub.accent || '#00d970'; defBold = (sub.pills && sub.pills[0]) ? sub.pills[0] : defAccent;
      } else if (S.theme === 'geo') {
        defBg = '#f0f0f5'; defText = '#111111'; defAccent = sub.accent || '#2F35E1'; defBold = sub.stat1 || sub.accent || '#ff7b00';
      }
    }
    
    const cc = S.customColors || {};
    cpEl.innerHTML = `
      <div class="cp-row"><label>Background</label><input type="color" value="${cc.bg || defBg}" onchange="setCustomColor('bg',this.value)"></div>
      <div class="cp-row"><label>Text</label><input type="color" value="${cc.text || defText}" onchange="setCustomColor('text',this.value)"></div>
      <div class="cp-row"><label>Accent (UI)</label><input type="color" value="${cc.accent || defAccent}" onchange="setCustomColor('accent',this.value)"></div>
      <div class="cp-row"><label>Bold colors</label><input type="color" value="${cc.bold || defBold}" onchange="setCustomColor('bold',this.value)"></div>
      ${S.customColors ? '<button class="bghost" style="color:var(--low);font-size:11px;padding:6px" onclick="S.customColors=null;applyTheme();renderThemeGrid();save()">Reset custom colors</button>' : ''}`;
  }
}

// ── OVERLAYS ──
function openSheet(id) { document.getElementById(id).classList.add('open'); setTimeout(() => { const i = document.querySelector(`#${id} input`); if (i) { i.focus(); i.select(); } }, 200); }
function closeSheet(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.overlay').forEach(o => o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); }));

// ── NOTES LOGIC & STORAGE (IndexedDB + LocalStorage) ──
let db;
const request = indexedDB.open("PixelKeepDB", 1);
request.onupgradeneeded = (e) => {
  db = e.target.result;
  if (!db.objectStoreNames.contains("audioBlobs")) db.createObjectStore("audioBlobs");
};
request.onsuccess = (e) => { 
  db = e.target.result; 
  window._indexedDB = db;
  renderNotes(); 
};

let mediaRecorder;
let audioChunks = [];
let isRecording = false;
let isListMode = false;
let editingNoteId = null;
let notes = JSON.parse(localStorage.getItem("pixel-keep-notes")) || [];

function saveNotesState() {
  localStorage.setItem("pixel-keep-notes", JSON.stringify(notes));
  renderNotes();
}

function toggleInputMode() {
  isListMode = !isListMode;
  const textArea = document.getElementById("note-body");
  const listBuilder = document.getElementById("list-builder");
  const toggleBtn = document.getElementById("mode-toggle-btn");
  
  if (isListMode) {
    textArea.classList.add("hidden");
    listBuilder.classList.add("active");
    toggleBtn.textContent = "📝";
    
    if (document.getElementById("list-items-container").children.length === 0) {
      const lines = textArea.value.split('\n').filter(l => l.trim() !== '');
      if(lines.length > 0) {
        lines.forEach(l => addListInputRow(false, l.trim()));
      } else {
        addListInputRow();
      }
    }
  } else {
    textArea.classList.remove("hidden");
    listBuilder.classList.remove("active");
    toggleBtn.textContent = "☑️";
    
    if (textArea.value.trim() === '') {
      const rows = document.querySelectorAll(".list-item-val");
      let text = Array.from(rows).map(r => r.value.trim()).filter(v => v).join('\n');
      textArea.value = text;
    }
  }
}

function addListInputRow(checked = false, text = '') {
  const container = document.getElementById("list-items-container");
  const rowId = 'list-row-' + Date.now() + Math.floor(Math.random() * 1000);
  const row = document.createElement("div");
  row.className = "list-input-row";
  row.id = rowId;
  row.innerHTML = `
    <input type="checkbox" class="note-chk" ${checked ? 'checked' : ''} style="flex-shrink:0;">
    <input type="text" class="finput list-item-val" placeholder="List item..." value="${text.replace(/"/g, '&quot;')}">
    <button class="btn-icon remove" onclick="document.getElementById('${rowId}').remove()">✕</button>
  `;
  container.appendChild(row);
  if(!text) row.querySelector('.list-item-val').focus();
}

async function requestMicPermission() {
  const btn = document.getElementById("mic-btn");
  try {
    if (navigator.permissions) {
      const status = await navigator.permissions.query({ name: 'microphone' });
      if (status.state === 'denied') {
        showPermissionBanner();
        return false;
      }
    }
    const testStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    testStream.getTracks().forEach(t => t.stop());
    return true;
  } catch (err) {
    if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
      showPermissionBanner();
    } else {
      showToast('Mic error: ' + err.message);
    }
    return false;
  }
}

function showPermissionBanner() {
  let banner = document.getElementById('perm-banner');
  if (!banner) {
    banner = document.createElement('div');
    banner.id = 'perm-banner';
    banner.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#ff7b00;color:#fff;font-family:Space Mono,monospace;font-size:12px;font-weight:700;padding:14px 18px;text-align:center;border-bottom:3px solid #000;';
    banner.innerHTML = '⚠ MICROPHONE BLOCKED<br><span style="font-size:10px;font-weight:400;">Go to browser Settings → Site Settings → Microphone → Allow this site</span><br><button onclick="this.parentElement.remove()" style="margin-top:8px;background:#000;color:#fff;border:none;padding:4px 12px;font-family:inherit;cursor:pointer;">DISMISS</button>';
    document.body.prepend(banner);
  }
}

function showToast(msg) {
  let t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#000;color:#fff;font-family:Space Mono,monospace;font-size:11px;padding:8px 16px;border-radius:0;z-index:9999;white-space:nowrap;border:2px solid var(--accent);';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function toggleRecording() {
  const btn = document.getElementById("mic-btn");
  if (!isRecording) {
    btn.textContent = "...";
    btn.disabled = true;
    const granted = await requestMicPermission();
    btn.disabled = false;
    if (!granted) { btn.textContent = "Rec Audio"; return; }
    try {
      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
        ? 'audio/webm;codecs=opus'
        : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
      mediaRecorder = mimeType ? new MediaRecorder(stream, { mimeType }) : new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      
      // Stop recording event handler
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        const audioId = "audio-" + Date.now();
        const transaction = db.transaction(["audioBlobs"], "readwrite");
        transaction.objectStore("audioBlobs").put(audioBlob, audioId);
        stream.getTracks().forEach(t => t.stop());
        
        const noteId = Date.now();
        const newNote = { id: noteId, title: document.getElementById("note-title").value.trim() || "AUDIO DUMP", body: "", isList: false, audioKey: audioId };
        
        // Save note to Firestore
        if (window._firestore) {
          try {
            await window._firestoreSetDoc(window._firestoreDoc(window._firestore, 'notes', String(noteId)), newNote);
          } catch (e) {
            console.error("Error saving note to Firestore:", e);
          }
        }
        
        // Upload audio to Firebase Storage
        if (window.uploadAudioBlob) {
          await window.uploadAudioBlob(audioId, audioBlob);
        }
        
        document.getElementById("note-title").value = "";
        showToast("Audio saved ✓");
      };

      mediaRecorder.start();
      isRecording = true;
      btn.textContent = "⏹ Stop";
      btn.classList.add("recording");
    } catch (err) {
      showToast('Recording failed: ' + err.message);
      btn.textContent = "Rec Audio";
    }
  } else {
    mediaRecorder.stop();
    isRecording = false;
    btn.textContent = "Rec Audio";
    btn.classList.remove("recording");
  }
}

function editNote(id) {
  const note = notes.find(n => n.id === id);
  if(!note) return;
  
  editingNoteId = id;
  document.getElementById("note-title").value = note.title;
  document.getElementById("list-items-container").innerHTML = "";

  if (note.isList) {
    isListMode = true;
    document.getElementById("note-body").classList.add("hidden");
    document.getElementById("list-builder").classList.add("active");
    document.getElementById("mode-toggle-btn").textContent = "📝";
    note.body.forEach(item => addListInputRow(item.checked, item.text));
  } else {
    isListMode = false;
    document.getElementById("note-body").classList.remove("hidden");
    document.getElementById("list-builder").classList.remove("active");
    document.getElementById("mode-toggle-btn").textContent = "☑️";
    document.getElementById("note-body").value = note.body;
  }

  document.getElementById("save-note-btn").textContent = "Update Note";
  document.getElementById("cancel-edit-btn").style.display = "block";
  document.getElementById("mic-btn").style.display = "none";
  
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  editingNoteId = null;
  document.getElementById("note-title").value = "";
  document.getElementById("note-body").value = "";
  document.getElementById("list-items-container").innerHTML = "";
  document.getElementById("save-note-btn").textContent = "Save Note";
  document.getElementById("cancel-edit-btn").style.display = "none";
  document.getElementById("mic-btn").style.display = "block";
  if (isListMode) addListInputRow();
}

async function saveNote() {
  const title = document.getElementById("note-title").value.trim();
  let noteItems = null, hasContent = false;
  
  if (isListMode) {
    const rows = document.querySelectorAll(".list-input-row");
    noteItems = [];
    rows.forEach(row => {
      const input = row.querySelector(".list-item-val");
      const chk = row.querySelector(".note-chk");
      if (input && input.value.trim() !== "") { 
        noteItems.push({ text: input.value.trim(), checked: chk ? chk.checked : false }); 
        hasContent = true; 
      }
    });
  } else {
    const body = document.getElementById("note-body").value.trim();
    if (body !== "") { noteItems = body; hasContent = true; }
  }
  
  if (!title && !hasContent) return;

  if (editingNoteId) {
    const noteIndex = notes.findIndex(n => n.id === editingNoteId);
    if (noteIndex > -1) {
      notes[noteIndex].title = title || "UNTITLED NOTE";
      notes[noteIndex].body = noteItems;
      notes[noteIndex].isList = isListMode;
      
      if (window._firestore) {
        try {
          await window._firestoreSetDoc(window._firestoreDoc(window._firestore, 'notes', String(editingNoteId)), notes[noteIndex]);
        } catch(e) {
          console.error(e);
        }
      }
    }
    cancelEdit();
  } else {
    const noteId = Date.now();
    const newNote = { id: noteId, title: title || "UNTITLED NOTE", body: noteItems, isList: isListMode, audioKey: null };
    
    if (window._firestore) {
      try {
        await window._firestoreSetDoc(window._firestoreDoc(window._firestore, 'notes', String(noteId)), newNote);
      } catch(e) {
        console.error(e);
      }
    }
    
    document.getElementById("note-title").value = "";
    document.getElementById("note-body").value = "";
    document.getElementById("list-items-container").innerHTML = "";
    if (isListMode) addListInputRow();
  }
}

async function toggleCheck(noteId, itemIndex) {
  const note = notes.find(n => n.id === noteId);
  if (note && note.isList) { 
    note.body[itemIndex].checked = !note.body[itemIndex].checked; 
    if (window._firestore) {
      try {
        await window._firestoreSetDoc(window._firestoreDoc(window._firestore, 'notes', String(noteId)), note);
      } catch(e) {
        console.error(e);
      }
    }
  }
}

async function deleteNote(id, audioKey) {
  if (window._firestore) {
    try {
      await window._firestoreDeleteDoc(window._firestoreDoc(window._firestore, 'notes', String(id)));
      if (audioKey && audioKey !== 'null') {
        const transaction = db.transaction(["audioBlobs"], "readwrite");
        transaction.objectStore("audioBlobs").delete(audioKey);
        
        if (window._storage) {
          const storageRef = window._storageRef(window._storage, 'audioBlobs/' + audioKey);
          await window._storageDeleteObject(storageRef).catch(e => console.log("Storage delete err:", e));
        }
      }
    } catch(e) {
      console.error("Delete note error:", e);
    }
  } else {
    notes = notes.filter(n => n.id !== id);
    if (audioKey && audioKey !== 'null') {
      const transaction = db.transaction(["audioBlobs"], "readwrite");
      transaction.objectStore("audioBlobs").delete(audioKey);
    }
    saveNotesState();
  }
}

function renderNotes() {
  const container = document.getElementById("notes-container");
  container.innerHTML = "";
  notes.forEach(note => {
    const card = document.createElement("div");
    card.className = "note-card";
    let contentHtml = `<div class="note-title">${note.title}</div>`;

    if (note.audioKey) {
      contentHtml += `
        <div class="audio-container">
          <span class="audio-label">⚙ AUDIO_DUMP.WAV</span>
          <audio id="player-${note.audioKey}" controls style="display:none"></audio>
          <div class="audio-btns">
            <button id="btn-audio-${note.audioKey}" class="btn-main" style="padding:4px 8px;font-size:11px;width:auto;box-shadow:2px 2px 0 #000;" onclick="toggleAudioPlayback('${note.audioKey}')">▶ Play</button>
            <button class="btn-main" style="padding:4px 8px;font-size:11px;width:auto;box-shadow:2px 2px 0 #000;background:var(--accent);" onclick="transcribeAudio('${note.audioKey}')">To Text</button>
          </div>
        </div>`;
    } 
    
    if (note.isList) {
      contentHtml += `<div class="note-body" style="${note.audioKey ? 'margin-top:8px;' : ''}">`;
      note.body.forEach((item, idx) => {
        contentHtml += `<div class="check-item"><input type="checkbox" class="note-chk" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${note.id}, ${idx})"><span style="${item.checked ? 'text-decoration: line-through; opacity: 0.5' : ''}">${item.text}</span></div>`;
      });
      contentHtml += `</div>`;
    } else if (note.body) {
      contentHtml += `<div class="note-body" style="${note.audioKey ? 'margin-top:8px;' : ''}">${note.body}</div>`;
    }

    contentHtml += `
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 12px; border-top: 2px dashed #000; padding-top: 8px;">
        <button class="del-btn" style="color:var(--text); float:none; margin:0;" onclick="editNote(${note.id})">[EDIT]</button>
        <button class="del-btn" style="float:none; margin:0;" onclick="deleteNote(${note.id}, '${note.audioKey}')">[DELETE]</button>
      </div>`;
      
    card.innerHTML = contentHtml;
    container.appendChild(card);
  });
}

// ── GEMINI TRANSCRIPTION (Verbatim Extraction) ──
const GEMINI_KEY = ['AQ.Ab8RN6LCzD-Iab9Bi-VibTbnxmKOHlZQEjTs8_', 'brmYptbGbtgQ'].join('');
const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';

let currentTranscription = null;

async function transcribeAudio(audioKey) {
  document.getElementById('tpOverlay').classList.add('open');
  document.getElementById('tpText').style.display = 'none';
  document.getElementById('tpSaveBtn').style.display = 'none';
  document.getElementById('geminiThinkingInline').classList.add('visible');
  document.getElementById('thinkingLabel').textContent = 'LOADING AUDIO...';
  currentTranscription = null;

  try {
    const blob = await new Promise((resolve, reject) => {
      const tx = db.transaction(['audioBlobs'], 'readonly');
      const req = tx.objectStore('audioBlobs').get(audioKey);
      req.onsuccess = e => e.target.result ? resolve(e.target.result) : reject(new Error('Audio not found'));
      req.onerror = reject;
    });

    document.getElementById('thinkingLabel').textContent = 'CONVERTING AUDIO...';

    const base64Audio = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(blob);
    });

    const mimeType = blob.type || 'audio/webm';
    const geminiMime = mimeType.includes('mp4') ? 'audio/mp4'
                     : mimeType.includes('ogg')  ? 'audio/ogg'
                     : mimeType.includes('aac')  ? 'audio/aac'
                     : 'audio/webm';

    const systemPrompt = `You are a transcription assistant. Transcribe the audio verbatim — word for word.
RULES:
- NEVER invent or add words not clearly spoken.
- Use [unclear] for inaudible parts.
- If there is only silence or noise, return an empty string.
- Return ONLY a JSON object, no preamble, no markdown, no backticks.

{ "transcription": "verbatim text here" }`;

    const response = await fetch(`${GEMINI_URL}?key=${GEMINI_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        systemInstruction: { parts: [{ text: systemPrompt }] },
        contents: [{ parts: [
          { inline_data: { mime_type: geminiMime, data: base64Audio } },
          { text: 'Transcribe exactly what is spoken.' }
        ]}],
        generationConfig: { temperature: 0, maxOutputTokens: 800 }
      })
    });

    if (!response.ok) throw new Error(`Gemini ${response.status}`);

    const data = await response.json();
    const rawText = data.candidates?.[0]?.content?.parts?.map(p => p.text || '').join('') || '';
    const clean = rawText.replace(/```json/gi,'').replace(/```/g,'').trim();
    const parsed = JSON.parse(clean);
    currentTranscription = parsed.transcription || '';

    document.getElementById('geminiThinkingInline').classList.remove('visible');
    document.getElementById('tpText').textContent = currentTranscription || '(no speech detected)';
    document.getElementById('tpText').style.display = 'block';
    document.getElementById('tpSaveBtn').style.display = 'block';

  } catch (err) {
    console.error('Transcription error:', err);
    document.getElementById('geminiThinkingInline').classList.remove('visible');
    document.getElementById('tpText').textContent = '❌ Error: ' + (err.message || 'Conversion failed');
    document.getElementById('tpText').style.display = 'block';
    document.getElementById('tpSaveBtn').style.display = 'none';
  }
}

async function saveTranscriptionAsNote() {
  if (!currentTranscription) return;
  const now = new Date();
  const timeStr = now.toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit' });
  const dateStr = now.toLocaleDateString('en-CA', { month: 'short', day: 'numeric' }).toUpperCase();
  const noteId = Date.now();
  const newNote = {
    id: noteId,
    title: `🎙 DICTATION — ${timeStr}`,
    body: currentTranscription,
    isList: false,
    audioKey: null,
    date: dateStr
  };
  
  if (window._firestore) {
    try {
      await window._firestoreSetDoc(window._firestoreDoc(window._firestore, 'notes', String(noteId)), newNote);
    } catch(e) {
      console.error(e);
    }
  } else {
    notes.unshift(newNote);
    saveNotesState();
  }
  dismissTranscription();
  showToast('Dictation saved ✓');
}

function dismissTranscription() {
  document.getElementById('tpOverlay').classList.remove('open');
  document.getElementById('geminiThinkingInline').classList.remove('visible');
  document.getElementById('tpText').style.display = 'none';
  document.getElementById('tpSaveBtn').style.display = 'none';
  currentTranscription = null;
}

document.getElementById('tpOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('tpOverlay')) dismissTranscription();
});

function toggleAudioPlayback(audioKey) {
  const audio = document.getElementById(`player-${audioKey}`);
  const btn = document.getElementById(`btn-audio-${audioKey}`);
  if (!audio || !btn) return;

  // Stop any other currently playing audios on the page
  document.querySelectorAll('audio').forEach(otherAudio => {
    if (otherAudio !== audio && !otherAudio.paused) {
      otherAudio.pause();
      otherAudio.currentTime = 0;
      const otherKey = otherAudio.id.replace('player-', '');
      const otherBtn = document.getElementById(`btn-audio-${otherKey}`);
      if (otherBtn) otherBtn.textContent = "▶ Play";
    }
  });

  // If audio is playing, pause it (triggers onpause event to set button to Stop)
  if (!audio.paused) {
    audio.pause();
  }
  // If audio is paused and button is Stop, stop/reset it completely
  else if (btn.textContent.includes("Stop")) {
    audio.currentTime = 0;
    btn.textContent = "▶ Play";
  }
  // Otherwise (if stopped or paused in Play state), start playing
  else {
    if (!audio.src || audio.src === "") {
      const transaction = db.transaction(["audioBlobs"], "readonly");
      const request = transaction.objectStore("audioBlobs").get(audioKey);
      request.onsuccess = (e) => {
        const blob = e.target.result;
        if (blob) {
          audio.src = URL.createObjectURL(blob);
          
          audio.onplay = () => {
            btn.textContent = "⏸ Pause";
          };
          audio.onpause = () => {
            if (audio.currentTime === 0 || audio.ended) {
              btn.textContent = "▶ Play";
            } else {
              btn.textContent = "⏹ Stop";
            }
          };
          audio.onended = () => {
            btn.textContent = "▶ Play";
            audio.currentTime = 0;
          };
          
          audio.play();
        }
      };
    } else {
      audio.play();
    }
  }
}

<script type="module">

import { getStorage, ref, uploadBytes, getBytes, deleteObject }

// Verbatim Firebase Configuration from Budget App

  authDomain:        'dad-app-c3920.firebaseapp.com',

  messagingSenderId: '64907277674',
  appId:             '1:64907277674:web:6f4629695384cf78c1e113'
});

const db = getFirestore(fbApp);
const storage = getStorage(fbApp);

// Bind SDK objects to window for Vanilla JS scripts
window._firestore = db;
window._firestoreDoc = doc;
window._firestoreSetDoc = setDoc;
window._firestoreDeleteDoc = deleteDoc;
window._storage = storage;
window._storageRef = ref;
window._storageDeleteObject = deleteObject;

// Helper to check if audio blob exists locally in IndexedDB
function audioBlobExistsLocally(key) {
  return new Promise((resolve) => {
    if (!window._indexedDB) return resolve(false);
    const tx = window._indexedDB.transaction(["audioBlobs"], "readonly");
    const req = tx.objectStore("audioBlobs").get(key);
    req.onsuccess = (e) => resolve(!!e.target.result);
    req.onerror = () => resolve(false);
  });
}

// Download audio from Firebase Storage
async function downloadAudioBlob(key) {
  try {
    const storageRef = ref(storage, 'audioBlobs/' + key);
    const bytes = await getBytes(storageRef);
    const blob = new Blob([bytes], { type: 'audio/webm' });
    const tx = window._indexedDB.transaction(["audioBlobs"], "readwrite");
    tx.objectStore("audioBlobs").put(blob, key);
    if (window.renderNotes) window.renderNotes();
  } catch (e) {
    console.error("Error downloading audio blob:", e);
  }
}

// Upload audio to Firebase Storage
window.uploadAudioBlob = async function(key, blob) {
  try {
    const storageRef = ref(storage, 'audioBlobs/' + key);
    await uploadBytes(storageRef, blob);
  } catch (e) {
    console.error("Error uploading audio blob:", e);
  }
};

// Live Listener for Notes Collection
const notesQ = query(collection(db, 'notes'));
onSnapshot(notesQ, async (snap) => {
  let remoteNotes = [];
  snap.forEach(d => {
    remoteNotes.push(d.data());
  });
  remoteNotes.sort((a, b) => b.id - a.id);
  
  // Set global notes and trigger UI update
  notes = remoteNotes;
  localStorage.setItem("pixel-keep-notes", JSON.stringify(notes));
  if (window.renderNotes) window.renderNotes();

  // Sync missing audio files to local IndexedDB
  for (const note of notes) {
    if (note.audioKey) {
      const exists = await audioBlobExistsLocally(note.audioKey);
      if (!exists) {
        await downloadAudioBlob(note.audioKey);
      }
    }
  }
}, err => {
  console.error("Notes snapshot listener error:", err);
});
</script>

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js', {scope: './'})
    .then(reg => {
      // If there's an update, listen for state change to reload page automatically
      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (newWorker) {
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'activated') {
              window.location.reload();
            }
          });
        }
      });
    })
    .catch(e => console.log('SW error', e));
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  _deferredPrompt = e;
});

async function installPWA() {
  if(_deferredPrompt) {
    _deferredPrompt.prompt();
    await _deferredPrompt.userChoice;
    _deferredPrompt = null;
  }
}
